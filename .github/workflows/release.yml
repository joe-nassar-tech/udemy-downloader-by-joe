name: Create Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out the tagged code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build safe release package
        run: |
          mkdir -p release-package/docs release-package/courses release-package/logs
          cp main.py get_course.py cache_manager.py download_cache.py constants.py requirements.txt README.md LICENSE .gitignore release-package/
          cp .env.example cookies.json.example release-package/
          cp -r utils release-package/
          cp -r docs/. release-package/docs/
          cp n_m3u8dl-re.exe release-package/ 2>/dev/null || true
          cp shaka-packager.exe release-package/ 2>/dev/null || true
          touch release-package/cookies.txt release-package/cookies.json
          cd release-package
          zip -r "../udemy-downloader-by-joe-${{ github.ref_name }}.zip" .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: udemy-downloader-by-joe-${{ github.ref_name }}.zip
